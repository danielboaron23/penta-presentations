<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Penta — Presentations</title>
  <meta name="description" content="Penta product & design presentations — Skill Building, the Seller Profile workflow, and the desktop & mobile concept comparisons." />

  <link rel="preload" href="https://npm-assets.fiverrcdn.com/assets/uploads/macan-bold.woff2" as="font" type="font/woff2" crossorigin />
  <link rel="preload" href="https://npm-assets.fiverrcdn.com/assets/uploads/macan-regular.woff2" as="font" type="font/woff2" crossorigin />

  <style>
    :root{
      --ink:#222325; --body:#404145; --muted:#62646a; --faint:#95979d;
      --line:#e4e5e7; --divide:#efeff0; --paper:#fff; --wash:#f7f7f8;
      --ease-penta:cubic-bezier(.24,.48,0,.98);
      --c1:#2b2b30; --c2:#2563eb; --c3:#caa86a;
    }
    *{box-sizing:border-box;}
    html,body{height:100%;margin:0;}
    body{font-family:'Macan','Helvetica Neue',Helvetica,Arial,sans-serif;color:var(--body);
      background:#f3f3f5;-webkit-font-smoothing:antialiased;overflow:hidden;display:flex;flex-direction:column;}

    /* ===== header (stacks main nav + contextual sub-nav) ===== */
    header.bar{flex-shrink:0;z-index:10;background:rgba(255,255,255,.9);backdrop-filter:saturate(1.4) blur(12px);border-bottom:1px solid var(--line);}

    /* main nav row */
    .nav{height:60px;display:flex;align-items:center;gap:16px;padding:0 18px;}
    .brand{display:flex;align-items:center;gap:9px;font-size:13px;color:var(--faint);letter-spacing:.1em;text-transform:uppercase;font-weight:600;flex-shrink:0;}
    .brand b{color:var(--ink);letter-spacing:0;text-transform:none;font-weight:700;font-size:16px;}
    .brand .dot{width:8px;height:8px;border-radius:50%;background:var(--ink);}

    .tabs{display:flex;gap:4px;background:#eef0f2;border:1px solid var(--line);border-radius:999px;padding:4px;overflow-x:auto;scrollbar-width:none;}
    .tabs::-webkit-scrollbar{display:none;}
    .tab{border:none;background:transparent;font:inherit;font-size:14px;font-weight:600;color:var(--muted);
      padding:9px 16px;border-radius:999px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0;
      transition:background .25s var(--ease-penta),color .25s var(--ease-penta);}
    .tab .n{font-variant-numeric:tabular-nums;opacity:.5;font-weight:700;font-size:12px;}
    .tab .em{color:var(--faint);font-weight:600;}
    .tab:hover{color:var(--ink);}
    .tab.on{background:var(--ink);color:#fff;}
    .tab.on .n{opacity:.65;} .tab.on .em{color:rgba(255,255,255,.66);}

    .right{margin-inline-start:auto;display:flex;align-items:center;gap:14px;flex-shrink:0;}
    .hint{font-size:12.5px;color:var(--faint);white-space:nowrap;}
    .hint b{color:var(--body);font-weight:600;}
    .open{display:inline-flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--ink);text-decoration:none;
      border:1px solid var(--line);background:#fff;border-radius:10px;padding:9px 14px;transition:all .25s var(--ease-penta);white-space:nowrap;}
    .open:hover{background:var(--ink);color:#fff;border-color:var(--ink);}
    .open svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8;}

    /* ===== contextual sub-nav (comparison only) ===== */
    .subnav{display:none;align-items:center;gap:14px;padding:11px 18px;border-top:1px solid var(--divide);background:var(--wash);overflow-x:auto;scrollbar-width:none;}
    .subnav::-webkit-scrollbar{display:none;}
    .subnav.show{display:flex;}
    .crumb{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--muted);flex-shrink:0;white-space:nowrap;}
    .crumb svg{width:15px;height:15px;stroke:var(--faint);fill:none;stroke-width:1.8;}
    .crumb b{color:var(--ink);font-weight:600;}
    .subtabs{display:flex;gap:6px;flex-shrink:0;}
    .subtab{border:1px solid var(--line);background:#fff;font:inherit;font-size:13px;font-weight:600;color:var(--body);
      padding:8px 14px;border-radius:999px;cursor:pointer;white-space:nowrap;display:flex;align-items:center;gap:8px;flex-shrink:0;
      transition:all .22s var(--ease-penta);}
    .subtab .sw{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
    .subtab .bk{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;display:none;}
    .subtab:hover{border-color:#cdced1;background:#fff;color:var(--ink);}
    .subtab.on{background:var(--ink);border-color:var(--ink);color:#fff;}
    .subtab.home.on .bk{display:inline-block;}
    .subtab.home.on .ico{display:none;}
    .sublabel{font-size:12px;color:var(--faint);flex-shrink:0;white-space:nowrap;margin-inline-start:2px;}

    /* ===== stage ===== */
    .stage{flex:1;position:relative;min-height:0;background:#fff;}
    .stage iframe{width:100%;height:100%;border:0;display:block;}
    .loader{position:absolute;inset:0;display:grid;place-items:center;background:#fff;color:var(--faint);font-size:14px;
      pointer-events:none;opacity:0;transition:opacity .3s;}
    .loader.show{opacity:1;}
    .loader span.spin{width:22px;height:22px;border-radius:50%;border:2.5px solid var(--divide);border-top-color:var(--ink);
      animation:spin .8s linear infinite;margin-inline-end:11px;}
    @keyframes spin{to{transform:rotate(360deg);}}

    @media(max-width:900px){ .hint{display:none;} }
    @media(max-width:760px){
      .brand .txt{display:none;}
      .open .lbl{display:none;} .open{padding:9px 11px;}
      .tab{padding:8px 12px;font-size:13px;} .tab .n{display:none;}
      .sublabel{display:none;}
    }
    @media (prefers-reduced-motion: reduce){*{transition:none!important;animation:none!important;}}
  </style>
</head>
<body>
  <header class="bar">
    <!-- main sections -->
    <nav class="nav">
      <div class="brand"><span class="dot"></span><b>Penta</b><span class="txt">· Presentations</span></div>
      <div class="tabs" role="tablist" aria-label="Presentations">
        <button class="tab" role="tab" data-key="skills">
          <span class="n">01</span><span>Skill Building</span>
        </button>
        <button class="tab" role="tab" data-key="workflow">
          <span class="n">02</span><span>Seller Profile <span class="em">· Workflow</span></span>
        </button>
        <button class="tab" role="tab" data-key="desktop">
          <span class="n">03</span><span>Comparison <span class="em">· Desktop</span></span>
        </button>
        <button class="tab" role="tab" data-key="mobile">
          <span class="n">04</span><span>Comparison <span class="em">· Mobile</span></span>
        </button>
      </div>
      <div class="right">
        <span class="hint" id="hint">Click the deck, then use <b>← →</b></span>
        <a class="open" id="openBtn" href="skill-building.html" target="_blank" rel="noopener">
          <span class="lbl">Open full screen</span>
          <svg viewBox="0 0 24 24"><path d="M14 4h6v6M20 4l-9 9M19 13v6a1 1 0 0 1-1 1H5a1 1 0 0 1-1-1V6a1 1 0 0 1 1-1h6" stroke-linecap="round" stroke-linejoin="round"/></svg>
        </a>
      </div>
    </nav>

    <!-- contextual sub-nav for the comparison sections -->
    <div class="subnav" id="subnav" role="tablist" aria-label="Concept">
      <span class="crumb"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg><b id="crumbCtx">Comparison · Desktop</b></span>
      <div class="subtabs" id="subtabs"></div>
      <span class="sublabel" id="sublabel">Open a concept, or go back to the comparison</span>
    </div>
  </header>

  <div class="stage">
    <div class="loader show" id="loader"><span class="spin"></span> Loading…</div>
    <iframe id="frame" title="Presentation" src="skill-building.html"></iframe>
  </div>

  <script>
    (function(){
      var SECTIONS = {
        skills:   {label:'Skill Building',        deck:'skill-building.html',  hint:'Click the deck, then use <b>&larr; &rarr;</b>'},
        workflow: {label:'Seller Profile · Workflow', deck:'seller-profile-deck.html', hint:'Click the deck, then use <b>&larr; &rarr;</b>'},
        desktop:  {label:'Comparison · Desktop',  deck:'concepts.html', hint:'Scroll to explore · <b>open a concept</b> below', subs:[
          {key:'all',       label:'Comparison',     page:'concepts.html',          dot:null},
          {key:'classic',   label:'Classic',        page:'profile.html',           dot:'var(--c1)'},
          {key:'immersive', label:'Immersive',      page:'profile-immersive.html', dot:'var(--c2)'},
          {key:'noir',      label:'Editorial Noir', page:'profile-noir.html',      dot:'var(--c3)'}
        ]},
        mobile:   {label:'Comparison · Mobile',   deck:'concepts-mobile.html', hint:'Scroll to explore · <b>open a concept</b> below', subs:[
          {key:'all',       label:'Comparison',     page:'concepts-mobile.html',          dot:null},
          {key:'classic',   label:'Classic',        page:'profile-mobile.html',           dot:'var(--c1)'},
          {key:'immersive', label:'Immersive',      page:'profile-immersive-mobile.html', dot:'var(--c2)'},
          {key:'noir',      label:'Editorial Noir', page:'profile-noir-mobile.html',      dot:'var(--c3)'}
        ]}
      };
      var ALIASES = {seller:'workflow'}; // back-compat for the old #seller link

      var tabs=[].slice.call(document.querySelectorAll('.tab'));
      var byKey={}; tabs.forEach(function(t){byKey[t.dataset.key]=t;});
      var frame=document.getElementById('frame'), loader=document.getElementById('loader'), openBtn=document.getElementById('openBtn');
      var hint=document.getElementById('hint'), subnav=document.getElementById('subnav'), subtabs=document.getElementById('subtabs');
      var crumbCtx=document.getElementById('crumbCtx'), sublabel=document.getElementById('sublabel');

      var curKey=null, curSub='all';

      function load(page){
        if(frame.getAttribute('src')!==page){ loader.classList.add('show'); frame.setAttribute('src',page); }
        openBtn.setAttribute('href',page);
      }

      function renderSubs(sec){
        subtabs.innerHTML='';
        sec.subs.forEach(function(s){
          var b=document.createElement('button');
          b.className='subtab'+(s.key==='all'?' home':'');
          b.setAttribute('role','tab');
          b.dataset.sub=s.key;
          var inner='';
          if(s.key==='all'){
            inner='<svg class="bk" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6" stroke-linecap="round" stroke-linejoin="round"/></svg>'+
                  '<svg class="ico" style="width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8" viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/><rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/></svg>';
          } else if(s.dot){
            inner='<span class="sw" style="background:'+s.dot+'"></span>';
          }
          b.innerHTML=inner+'<span>'+s.label+'</span>';
          b.addEventListener('click',function(){ go(curKey,s.key,true); });
          subtabs.appendChild(b);
        });
      }

      function go(key, sub, fromClick){
        key = ALIASES[key] || key;
        var sec = SECTIONS[key]; if(!sec){ key='skills'; sec=SECTIONS.skills; }
        var switched = key!==curKey;
        curKey=key; curSub = (sec.subs ? (sub||'all') : 'all');

        tabs.forEach(function(t){ var on=t.dataset.key===key; t.classList.toggle('on',on); t.setAttribute('aria-selected',on); });
        hint.innerHTML = sec.hint;

        if(sec.subs){
          if(switched) renderSubs(sec);
          crumbCtx.textContent = sec.label;
          subnav.classList.add('show');
          var active = sec.subs.filter(function(s){return s.key===curSub;})[0] || sec.subs[0];
          [].forEach.call(subtabs.children,function(b){ var on=b.dataset.sub===curSub; b.classList.toggle('on',on); b.setAttribute('aria-selected',on); });
          sublabel.textContent = curSub==='all' ? 'Open a concept, or stay for the side-by-side' : 'Viewing one concept — tap Comparison to go back';
          load(active.page);
          document.title='Penta — '+sec.label+(curSub==='all'?'':' · '+active.label);
        } else {
          subnav.classList.remove('show');
          load(sec.deck);
          document.title='Penta — '+sec.label;
        }

        var hash = curSub && curSub!=='all' ? key+'-'+curSub : key;
        if(location.hash.slice(1)!==hash) history.replaceState(null,'','#'+hash);
      }

      tabs.forEach(function(t){ t.addEventListener('click',function(){ go(t.dataset.key,'all',true); }); });
      frame.addEventListener('load',function(){ loader.classList.remove('show'); });

      function parseHash(){
        var raw=location.hash.slice(1); if(!raw) return null;
        var dash=raw.indexOf('-');
        if(dash>-1){ return {key:raw.slice(0,dash), sub:raw.slice(dash+1)}; }
        return {key:raw, sub:'all'};
      }
      var init=parseHash();
      if(init && (SECTIONS[ALIASES[init.key]||init.key])) go(init.key, init.sub); else go('skills','all');
      window.addEventListener('hashchange',function(){ var h=parseHash(); if(h && (SECTIONS[ALIASES[h.key]||h.key])) go(h.key,h.sub); });
    })();
  </script>
</body>
</html>
